# Vendored copy of the web-fetcher v1 allowlist.
#
# Canonical source: ai-ops-meta `registry/web-allowlist.yaml` (sibling PR
# pending — until that meta-side file ships, this vendor copy is the only
# source). Alpha-stage rule + reproducibility: the agent reads this file
# at boot, not a live cross-repo fetch.
#
# Each entry:
#   - domain     — bare hostname; the boot self-check DNS-resolves it.
#   - purpose    — one-line human note on why the domain is allowed.
#   - ttl_class  — `insurance-med` | `airline` | `generic` (web-config.ts).
#   - added_at   — ISO 8601 date when the entry landed in the allowlist.
#
# Adding an entry: file a runner PR to this vendor file AND the meta-side
# canonical (when it lands). Removing an entry: same. The boot self-check
# fails loud on DNS resolution / HEAD probe failure — that's the dead-entry
# canary, not the only failure mode.

entries:
  # ---- Insurance comparators (ttl_class: insurance-med, 24h refresh) ----
  - domain: comparethemarket.com
    purpose: insurance comparator — motor/home/life
    ttl_class: insurance-med
    added_at: 2026-05-13
  - domain: gocompare.com
    purpose: insurance comparator — motor/home/travel
    ttl_class: insurance-med
    added_at: 2026-05-13
  - domain: confused.com
    purpose: insurance comparator — motor/home
    ttl_class: insurance-med
    added_at: 2026-05-13

  # ---- Airline / flight info (ttl_class: airline, 1h refresh) ----
